kind = "web"
previewPath = "/"
title = "Credit Hub KE"
version = "1.0.0"
id = "artifacts/credit-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18731

[services.development]
run = "pnpm --filter @workspace/credit-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/credit-hub", "run", "build" ]
publicDir = "artifacts/credit-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18731"
BASE_PATH = "/"
